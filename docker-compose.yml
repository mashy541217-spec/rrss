version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rrss-postgres
    environment:
      POSTGRES_DB: rrss_auto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecurepassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rrss-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: rrss-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:supersecurepassword@postgres:5432/rrss_auto?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-web:
    build:
      context: .
      dockerfile: docker/studio.Dockerfile
    container_name: rrss-control-center
    ports:
      - "5174:80"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: rrss-worker-node
    environment:
      - ORCHESTRATOR_URL=http://api:3000
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
